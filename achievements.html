<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Achievements | Hogwarts Focus</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

.achievements-page{
padding:140px 50px 80px;
max-width:1400px;
margin:auto;
}

.page-title{
text-align:center;
margin-bottom:50px;
}

.page-title h1{
font-family:'Cinzel',serif;
font-size:3rem;
color:#d4af37;
}

.achievement-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.achievement-card{
background:#141419;
border:1px solid rgba(212,175,55,.25);
padding:25px;
border-radius:12px;
transition:.3s;
}

.unlocked{
border:2px solid #d4af37;
box-shadow:0 0 20px rgba(212,175,55,.25);
}

.locked{
opacity:.55;
}

.achievement-card h3{
margin-bottom:10px;
color:#d4af37;
}

.reward{
margin-top:10px;
font-size:.9rem;
color:#f7d774;
}

.progress-section{
margin-bottom:50px;
}

.progress-bar{
height:30px;
background:#222;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#d4af37,
#f7d774
);
}

.center{
text-align:center;
margin-top:15px;
}

</style>
</head>

<body>

<header class="navbar">

<div class="logo">
⚡ Hogwarts Focus
</div>

<nav>
<a href="index.html">🚂 Express</a>
<a href="diagon-alley.html">🏪 Diagon Alley</a>
<a href="inventory.html">🎒 Inventory</a>
<a href="achievements.html">🏆 Achievements</a>
<a href="settings.html">⚙ Settings</a>
</nav>

</header>

<div class="achievements-page">

<div class="page-title">

<h1>🏆 Achievements</h1>

<p>
Unlock magical accomplishments through study and collecting.
</p>

</div>

<div class="progress-section">

<h2>Achievement Progress</h2>

<div class="progress-bar">
<div
id="achievementProgress"
class="progress-fill">
</div>
</div>

<p
id="achievementPercent"
class="center">
0%
</p>

</div>

<div
id="achievementGrid"
class="achievement-grid">
</div>

</div>

<script>

const STORAGE_KEY =
"hogwartsFocusData";

const data =
JSON.parse(
localStorage.getItem(
STORAGE_KEY
)
) || {};

const studyMinutes =
data.studyMinutes || 0;

const galleons =
data.galleons || 0;

const inventory =
data.inventory || [];

const achievements = [

{
title:"First Study Session",
desc:"Study for 1 minute.",
reward:"+10 House Points",
unlocked:studyMinutes>=1
},

{
title:"Apprentice Wizard",
desc:"Study for 60 minutes.",
reward:"+50 Galleons",
unlocked:studyMinutes>=60
},

{
title:"Dedicated Scholar",
desc:"Study for 300 minutes.",
reward:"+100 Galleons",
unlocked:studyMinutes>=300
},

{
title:"Master of Focus",
desc:"Study for 1000 minutes.",
reward:"+500 Galleons",
unlocked:studyMinutes>=1000
},

{
title:"100 Galleons",
desc:"Earn 100 Galleons.",
reward:"Bronze Collector",
unlocked:galleons>=100
},

{
title:"Gold Collector",
desc:"Earn 1000 Galleons.",
reward:"Golden Badge",
unlocked:galleons>=1000
},

{
title:"Wizard Banker",
desc:"Earn 5000 Galleons.",
reward:"Vault Key",
unlocked:galleons>=5000
},

{
title:"Legendary Wealth",
desc:"Earn 10000 Galleons.",
reward:"Gringotts VIP",
unlocked:galleons>=10000
},

{
title:"First Purchase",
desc:"Buy one item.",
reward:"+20 Galleons",
unlocked:inventory.length>=1
},

{
title:"Collector",
desc:"Own 10 items.",
reward:"Collector Badge",
unlocked:inventory.length>=10
},

{
title:"Magical Merchant",
desc:"Own 20 items.",
reward:"+200 Galleons",
unlocked:inventory.length>=20
},

{
title:"Creature Keeper",
desc:"Own 3 magical creatures.",
reward:"Animal Companion",
unlocked:
inventory.filter(item=>
[
"Barn Owl",
"Snowy Owl",
"Black Cat",
"Toad",
"Kneazle",
"Pygmy Puff",
"Baby Hippogriff",
"Phoenix",
"Thestral"
].includes(item)
).length>=3
},

{
title:"Wand Master",
desc:"Own 3 wands.",
reward:"Wand Collection",
unlocked:
inventory.filter(item=>
[
"Oak Wand",
"Cherry Wand",
"Willow Wand",
"Phoenix Core Wand",
"Dragon Heartstring Wand",
"Unicorn Hair Wand",
"Elder Wand Replica"
].includes(item)
).length>=3
},

{
title:"Quidditch Captain",
desc:"Own 3 brooms.",
reward:"Flight Master",
unlocked:
inventory.filter(item=>
[
"Cleansweep One",
"Cleansweep Seven",
"Comet 260",
"Nimbus 2000",
"Nimbus 2001",
"Firebolt",
"Firebolt Supreme"
].includes(item)
).length>=3
},

{
title:"Hogwarts Legend",
desc:"Own 30 total items.",
reward:"Legendary Status",
unlocked:inventory.length>=30
}

];

const container =
document.getElementById(
"achievementGrid"
);

let unlockedCount=0;

achievements.forEach(a=>{

if(a.unlocked){
unlockedCount++;
}

const card =
document.createElement("div");

card.className =
`achievement-card ${
a.unlocked
?
'unlocked'
:
'locked'
}`;

card.innerHTML=`

<h3>
${a.unlocked ? "✨" : "🔒"}
${a.title}
</h3>

<p>
${a.desc}
</p>

<div class="reward">
Reward:
${a.reward}
</div>

`;

container.appendChild(card);

});

const percent =
Math.round(
(unlockedCount /
achievements.length)
*100
);

document.getElementById(
"achievementProgress"
).style.width =
percent+"%";

document.getElementById(
"achievementPercent"
).textContent =
`${unlockedCount}/${achievements.length}
Achievements (${percent}%)`;

</script>

</body>
</html>
