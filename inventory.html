<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventory | Hogwarts Focus</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

.inventory-page{
padding:140px 50px 80px;
max-width:1400px;
margin:auto;
}

.inventory-header{
text-align:center;
margin-bottom:50px;
}

.inventory-header h1{
font-family:'Cinzel',serif;
font-size:3rem;
color:#d4af37;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:50px;
}

.stat-card{
background:#141419;
border:1px solid rgba(212,175,55,.25);
padding:25px;
border-radius:12px;
text-align:center;
}

.stat-card h3{
color:#d4af37;
margin-bottom:10px;
}

.stat-card p{
font-size:2rem;
font-weight:bold;
}

.inventory-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.inventory-item{
background:#141419;
border:1px solid rgba(212,175,55,.25);
padding:20px;
border-radius:12px;
}

.inventory-item h3{
margin-bottom:10px;
color:#d4af37;
}

.empty{
text-align:center;
padding:60px;
background:#141419;
border-radius:12px;
}

.progress-wrapper{
margin-top:40px;
}

.progress-bar{
height:30px;
background:#222;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:linear-gradient(
90deg,
#d4af37,
#f7d774
);
width:0%;
transition:.5s;
}

</style>
</head>

<body>

<header class="navbar">

<div class="logo">
⚡ Hogwarts Focus
</div>

<nav>
<a href="index.html">🚂 Express</a>
<a href="diagon-alley.html">🏪 Diagon Alley</a>
<a href="inventory.html">🎒 Inventory</a>
<a href="achievements.html">🏆 Achievements</a>
<a href="settings.html">⚙ Settings</a>
</nav>

</header>

<div class="inventory-page">

<div class="inventory-header">

<h1>🎒 Magical Inventory</h1>

<p>Your collected magical items</p>

</div>

<div class="stats-grid">

<div class="stat-card">
<h3>Total Items</h3>
<p id="totalItems">0</p>
</div>

<div class="stat-card">
<h3>Collection Value</h3>
<p id="collectionValue">0</p>
</div>

<div class="stat-card">
<h3>Owned Wands</h3>
<p id="wandCount">0</p>
</div>

<div class="stat-card">
<h3>Owned Creatures</h3>
<p id="animalCount">0</p>
</div>

</div>

<div class="progress-wrapper">

<h2>Collection Progress</h2>

<div class="progress-bar">
<div
id="collectionProgress"
class="progress-fill">
</div>
</div>

<p id="progressText">
0%
</p>

</div>

<br><br>

<div
id="inventoryContainer"
class="inventory-grid">
</div>

</div>

<script>

const STORAGE_KEY =
"hogwartsFocusData";

const data =
JSON.parse(
localStorage.getItem(
STORAGE_KEY
)
) || {
inventory:[]
};

const inventory =
data.inventory || [];

// master item list

const allItems=[

"Chocolate Frog",
"Fizzing Whizzbees",
"Bertie Bott's Beans",
"Peppermint Toad",
"Acid Pop",
"Pumpkin Pasty",
"Cauldron Cake",
"Licorice Wand",
"Treacle Tart",
"Sugar Quill",

"Oak Wand",
"Cherry Wand",
"Willow Wand",
"Phoenix Core Wand",
"Dragon Heartstring Wand",
"Unicorn Hair Wand",
"Elder Wand Replica",

"Cleansweep One",
"Cleansweep Seven",
"Comet 260",
"Nimbus 2000",
"Nimbus 2001",
"Firebolt",
"Firebolt Supreme",

"Barn Owl",
"Snowy Owl",
"Black Cat",
"Toad",
"Kneazle",
"Pygmy Puff",
"Baby Hippogriff",
"Phoenix",
"Thestral"

];

const itemPrices={

"Chocolate Frog":20,
"Fizzing Whizzbees":25,
"Bertie Bott's Beans":30,
"Peppermint Toad":35,
"Acid Pop":40,
"Pumpkin Pasty":45,
"Cauldron Cake":50,
"Licorice Wand":60,
"Treacle Tart":75,
"Sugar Quill":100,

"Oak Wand":1000,
"Cherry Wand":1200,
"Willow Wand":1500,
"Phoenix Core Wand":1800,
"Dragon Heartstring Wand":2200,
"Unicorn Hair Wand":2500,
"Elder Wand Replica":5000,

"Cleansweep One":1000,
"Cleansweep Seven":1500,
"Comet 260":2000,
"Nimbus 2000":3500,
"Nimbus 2001":5000,
"Firebolt":10000,
"Firebolt Supreme":20000,

"Barn Owl":2000,
"Snowy Owl":2500,
"Black Cat":3000,
"Toad":3500,
"Kneazle":5000,
"Pygmy Puff":7000,
"Baby Hippogriff":15000,
"Phoenix":25000,
"Thestral":40000

};

const wandItems=[
"Oak Wand",
"Cherry Wand",
"Willow Wand",
"Phoenix Core Wand",
"Dragon Heartstring Wand",
"Unicorn Hair Wand",
"Elder Wand Replica"
];

const animalItems=[
"Barn Owl",
"Snowy Owl",
"Black Cat",
"Toad",
"Kneazle",
"Pygmy Puff",
"Baby Hippogriff",
"Phoenix",
"Thestral"
];

const container =
document.getElementById(
"inventoryContainer"
);

let value=0;
let wandCount=0;
let animalCount=0;

if(inventory.length===0){

container.innerHTML=`
<div class="empty">
<h2>No Items Yet</h2>
<p>
Visit Diagon Alley and buy
your first magical item.
</p>
</div>
`;

}else{

inventory.forEach(item=>{

value +=
itemPrices[item] || 0;

if(
wandItems.includes(item)
){
wandCount++;
}

if(
animalItems.includes(item)
){
animalCount++;
}

const card =
document.createElement("div");

card.className =
"inventory-item";

card.innerHTML=`
<h3>${item}</h3>
<p>
Owned Magical Item
</p>
`;

container.appendChild(card);

});

}

document.getElementById(
"totalItems"
).textContent=
inventory.length;

document.getElementById(
"collectionValue"
).textContent=
value;

document.getElementById(
"wandCount"
).textContent=
wandCount;

document.getElementById(
"animalCount"
).textContent=
animalCount;

const progress =
Math.round(
(
inventory.length /
allItems.length
)*100
);

document.getElementById(
"collectionProgress"
).style.width =
progress+"%";

document.getElementById(
"progressText"
).textContent =
progress+"% Complete";

</script>

</body>
</html>
