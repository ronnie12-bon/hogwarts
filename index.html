<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hogwarts Study Focus</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<header>

<div class="logo">
⚡ Hogwarts Focus
</div>

<nav>
<a href="#">Library</a>
<a href="#">Express</a>
<a href="#">Tower</a>
<a href="#">Ambience</a>
</nav>

</header>

<section class="hero">

<div class="overlay">

<h1>Study Aboard The Hogwarts Express</h1>

<p>
Travel through the Scottish Highlands while focusing on your work.
</p>

<button id="startBtn">
Start Studying
</button>

</div>

</section>

<section class="timer-section">

<h2>Focus Timer</h2>

<div id="timer">25:00</div>

<div class="controls">
<button id="play">▶ Start</button>
<button id="reset">↻ Reset</button>
</div>

</section>

<section class="audio-section">

<h2>Train Ambience</h2>

<audio id="audio" loop>
<source src="ambient.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">
🎵 Play Ambience
</button>

</section>

<section class="notes">

<h2>Study Notes</h2>

<textarea placeholder="Write your notes here..."></textarea>

</section>

<footer>

Made for Magical Productivity ✨

</footer>

<script src="script.js"></script>

</body>
</html>
