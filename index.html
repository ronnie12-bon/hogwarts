<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hogwarts Focus</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<div class="logo">
⚡ Hogwarts Focus
</div>

<nav>

<a href="#">Express</a>

<a href="#">Inventory</a>

<a href="#">Achievements</a>

<a href="#">Settings</a>

</nav>

</header>

<!-- HERO -->

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>🚂 Hogwarts Express</h1>

<p>
Journey through the Scottish Highlands while mastering your studies.
</p>

<button id="startBtn">
Board The Express
</button>

</div>

</section>

<!-- DASHBOARD -->

<section class="dashboard">

<div class="card">

<h3>⭐ Wizard Level</h3>

<p id="level">1</p>

</div>

<div class="card">

<h3>💰 Galleons</h3>

<p id="galleons">0</p>

</div>

<div class="card">

<h3>🏆 House Points</h3>

<p id="housePoints">0</p>

</div>

<div class="card">

<h3>📚 Study Minutes</h3>

<p id="studyMinutes">0</p>

</div>

</section>

<script src="js/app.js"></script>

</body>
</html>
